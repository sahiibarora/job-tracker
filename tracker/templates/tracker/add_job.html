<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Job Application</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #fff5f5; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 560px; margin: 0 auto; }
    .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; text-decoration: none; margin-bottom: 24px; font-weight: 600; }
    .back:hover { color: #dc2626; }
    h1 { font-size: 24px; font-weight: 800; color: #1a0000; margin-bottom: 6px; }
    h1 span { color: #dc2626; }
    .subtitle { font-size: 14px; color: #9ca3af; margin-bottom: 28px; }
    .card { background: #fff; border-radius: 16px; padding: 36px; border: 1px solid #fecaca; box-shadow: 0 2px 8px rgba(220,38,38,0.06); }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    label { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.07em; }
    input, select, textarea { padding: 12px 14px; border: 1.5px solid #fecaca; border-radius: 10px; font-size: 14px; color: #1a0000; font-family: 'Segoe UI', sans-serif; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #fff8f8; }
    input:focus, select:focus, textarea:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }
    input::placeholder, textarea::placeholder { color: #9ca3af; }
    textarea { min-height: 100px; resize: vertical; }
    .btn { width: 100%; padding: 14px; background: #dc2626; color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .btn:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <a href="{% url 'dashboard' %}" class="back">← Back to Dashboard</a>
    <h1>Add <span>Application</span></h1>
    <p class="subtitle">Track a new job you've applied to.</p>
    <div class="card">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" name="company" placeholder="e.g. Google, Infosys, Startup XYZ" required>
        </div>
        <div class="form-group">
          <label for="role">Role / Position</label>
          <input type="text" id="role" name="role" placeholder="e.g. Python Developer Intern" required>
        </div>
        <div class="form-group">
          <label for="date">Date Applied</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="form-group">
          <label for="notes">Notes (optional)</label>
          <textarea id="notes" name="notes" placeholder="Any notes about this application..."></textarea>
        </div>
        <button type="submit" class="btn">Save Application</button>
      </form>
    </div>
  </div>
</body>
</html>
